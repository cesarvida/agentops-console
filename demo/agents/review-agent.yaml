id: demo-review-002
name: Demo Review Agent
version: 2.0.0
description: Agent with overly high rate limit and timeout — triggers warnings
owner: team-demo
actions:
  - read_code
  - read_files
  - post_comment
  - create_report
  - send_notification
rate_limit:
  requests_per_minute: 2000
timeout_seconds: 400
environments:
  - development
audit:
  log_all_actions: true
  retention_days: 30
rules:
  - "Broad read access allowed"
tools:
  - code_reader
  - metrics_reader
  - notifier
