id: demo-approved-001
name: Demo Approved Agent
version: 1.0.0
description: Minimal fully compliant agent used in governance demo
owner: team-demo
actions:
  - read_code
  - read_files
  - post_comment
  - create_report
rate_limit:
  requests_per_minute: 60
timeout_seconds: 30
environments:
  - development
  - staging
audit:
  log_all_actions: true
  retention_days: 90
governance:
  allowed_actions:
    - read_code
    - read_files
    - post_comment
    - create_report
  audit:
    requires_audit: true
rules:
  - "Only read operations allowed"
  - "Must log all actions"
tools:
  - code_reader
  - file_reader
