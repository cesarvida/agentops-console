name: Prompt Security Analysis

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.py'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and Build
        run: dotnet build src/AgentOps.CLI/AgentOps.CLI.csproj --configuration Release

      - name: Get changed files
        id: changed_files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep -E '\.(md|py)$' > changed_files.txt || true
          echo "Changed files:"
          cat changed_files.txt || echo "(none)"

      - name: Analyze changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p outputs
          overall_exit=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Analyzing: $file"
              dotnet run --project src/AgentOps.CLI \
                -- analyze "$file" \
                --output outputs \
                --post-comment \
                --owner "$REPO_OWNER" \
                --repo "$REPO_NAME" \
                --pr "$PR_NUMBER" || overall_exit=1
            fi
          done < changed_files.txt
          exit $overall_exit

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: outputs/analysis-*.json
          if-no-files-found: ignore
