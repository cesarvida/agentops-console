name: AI Governance Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce:
    name: Governance Enforcement
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore AgentOps.Console.sln
          dotnet build AgentOps.Console.sln --no-restore --configuration Release

      - name: Detect changed agent definitions
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^data/agent-definitions/.*\.yaml$' || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "$CHANGED" > changed_agents.txt
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Changed agent files:"
            echo "$CHANGED"
          fi

      - name: No agent definitions changed
        if: steps.changed.outputs.skip == 'true'
        run: |
          echo "✅ No agent definition files changed — governance check skipped."
          echo "::notice::No agent definition changes detected. Governance check passed."

      - name: Run governance enforcement
        if: steps.changed.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          mkdir -p outputs
          OVERALL_STATUS=0

          while IFS= read -r agent_file; do
            if [ ! -f "$agent_file" ]; then
              echo "⚠️  File not found (deleted?): $agent_file — skipping"
              continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔍 Validating: $agent_file"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            dotnet run --project src/AgentOps.CLI/AgentOps.CLI.csproj \
              --no-build --configuration Release \
              -- validate-agent "$agent_file" \
                 --post-comment \
                 --pr "$PR_NUMBER" \
                 --owner "$REPO_OWNER" \
                 --repo "$REPO_NAME"
            EXIT_CODE=$?

            if [ $EXIT_CODE -ne 0 ]; then
              echo ""
              echo "❌ GOVERNANCE FAILURE: $agent_file"
              echo "::error file=$agent_file::AI Governance Check FAILED — agent has critical violations that must be resolved before merge."
              OVERALL_STATUS=1
            else
              echo ""
              echo "✅ GOVERNANCE PASS: $agent_file"
            fi

          done < changed_agents.txt

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ $OVERALL_STATUS -eq 0 ]; then
            echo "✅ All agent governance checks passed. Merge is unblocked."
          else
            echo "❌ One or more agents failed governance. Merge is BLOCKED."
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit $OVERALL_STATUS

      - name: Upload governance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-reports
          path: outputs/governance-*.json
          if-no-files-found: ignore
