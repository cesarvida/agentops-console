name: PR Analysis
on:
  pull_request:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AgentOps.Console.sln

      - name: Build
        run: dotnet build AgentOps.Console.sln -c Release --no-restore

      - name: Analyze
        run: dotnet run --project src/AgentOps.CLI -c Release -- analyze-pr ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }}

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: data/evaluations/
          retention-days: 5

  comment:
    needs: analyze
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: data/evaluations/

      - name: Find report
        id: report
        run: echo "path=$(find data/evaluations -name 'evaluation_*.json' -type f | head -1)" >> $GITHUB_OUTPUT

      - name: Render
        if: steps.report.outputs.path != ''
        run: dotnet run --project src/AgentOps.CLI -c Release -- render-pr-comment --report ${{ steps.report.outputs.path }} --out agentops-comment.md

      - name: Comment
        if: steps.report.outputs.path != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('agentops-comment.md', 'utf-8');
            const comments = await github.rest.issues.listComments({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number});
            const existing = comments.data.find(c => c.body.includes('<!-- agentops-pr-analysis -->'));
            if (existing) {await github.rest.issues.updateComment({owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: body});}
            else {await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: body});}




