name: PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  analyze:
    # Analyze PR code with minimal permissions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AgentOps.Console.sln

      - name: Build
        run: dotnet build AgentOps.Console.sln --configuration Release --no-restore

      - name: Run AgentOps PR analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet run --project src/AgentOps.CLI/AgentOps.CLI.csproj -c Release -- analyze-pr ${{ github.repository_owner }} ${{ github.event.repository.name }} ${{ github.event.pull_request.number }}

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: data/evaluations/
          retention-days: 5

  comment:
    # Post/update PR comment with findings (shared workflow, separate permissions)
    needs: analyze
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      actions: read
    steps:
      - name: Setup .NET (for CLI)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Checkout main for CLI (not PR branch)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download evaluation artifacts from analyze job
        uses: actions/download-artifact@v4
        with:
          name: evaluation-reports
          path: data/evaluations/

      - name: Find latest evaluation report
        id: find_report
        run: |
          # Find the most recent evaluation report
          REPORT=$(find data/evaluations -name "evaluation_*.json" -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1 | cut -d' ' -f2-)
          if [ -z "$REPORT" ]; then
            echo "report_path=" >> $GITHUB_OUTPUT
          else
            echo "report_path=$REPORT" >> $GITHUB_OUTPUT
          fi

      - name: Render PR comment from report
        if: steps.find_report.outputs.report_path != ''
        run: |
          dotnet run --project src/AgentOps.CLI/AgentOps.CLI.csproj -c Release -- render-pr-comment \
            --report "${{ steps.find_report.outputs.report_path }}" \
            --out agentops-comment.md

      - name: Find or create PR comment
        if: steps.find_report.outputs.report_path != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const marker = '<!-- agentops-pr-analysis -->';
            
            // Read the rendered comment
            const body = fs.readFileSync('agentops-comment.md', 'utf-8');
            
            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            // Find existing AgentOps comment
            const existingComment = comments.data.find(comment => 
              comment.body.includes(marker)
            );
            
            if (existingComment) {
              // Update existing comment
              console.log(`Updating existing comment #${existingComment.id}`);
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              // Create new comment
              console.log('Creating new AgentOps comment');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: No evaluation report found
        if: steps.find_report.outputs.report_path == ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- agentops-pr-analysis -->';
            const body = `${marker}\n\n## 🔍 AgentOps PR Analysis\n\nNo evaluation report was generated for this PR. This may occur if:\n- No .md or .py files were changed\n- The analysis job did not complete successfully\n\nPlease check the build logs for details.`;
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingComment = comments.data.find(comment => 
              comment.body.includes(marker)
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }


