name: PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  analyze:
    # Run on pull_request event (no write token needed for analysis)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore AgentOps.Console.sln

      - name: Build
        run: dotnet build AgentOps.Console.sln --configuration Release --no-restore

      - name: Run AgentOps PR analysis
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "Running AgentOps PR analysis"
          printf "8\n$OWNER\n$REPO\n$PR_NUMBER\n" | dotnet run --project src/AgentOps.CLI/AgentOps.CLI.csproj

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: data/evaluations/
          retention-days: 5

  comment:
    # Run on pull_request_target event (has write token for PR comments)
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-reports
          path: data/evaluations/

      - name: Publish findings as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'data/evaluations';
            let body = '';
            
            if (!fs.existsSync(path)) {
              body = 'AgentOps: No evaluation report generated for this PR.';
            } else {
              const files = fs.readdirSync(path).filter(f => f.startsWith('evaluation_')).sort((a,b) => {
                return fs.statSync(path + '/' + b).mtime - fs.statSync(path + '/' + a).mtime;
              });
              if (files.length === 0) {
                body = 'AgentOps: No evaluation report generated for this PR.';
              } else {
                const latest = path + '/' + files[0];
                const report = JSON.parse(fs.readFileSync(latest, 'utf8'));
                const scores = `Security: ${report.Metrics?.SecurityScore ?? 'N/A'} | Compliance: ${report.Metrics?.ComplianceScore ?? 'N/A'} | Consistency: ${report.Metrics?.ConsistencyScore ?? 'N/A'} | Combined: ${report.Metrics?.CombinedQualityScore ?? 'N/A'}`;
                const findings = (report.Findings || []).map(f => `- [${f.Severity}] ${f.Summary}`).join('\n') || 'No findings.';
                body = `## AgentOps PR Analysis\n\n**Scores:** ${scores}\n\n**Findings:**\n${findings}\n\n_This comment was posted by the AgentOps automated analyzer._`;
              }
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

