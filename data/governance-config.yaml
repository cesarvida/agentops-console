governance:
  version: "1.0.0"
  repo: "cesarvida/agentops-console"

  # Acciones permitidas para este repo
  allowed_actions:
    - read_code
    - post_comment
    - request_changes
    - read_files
    - read_logs
    - send_notification
    - create_report
    - read_metrics

  # Acciones siempre prohibidas en este repo
  forbidden_actions:
    - push_to_main
    - delete_files
    - delete_database
    - access_secrets
    - modify_permissions
    - execute_code
    - bypass_authentication
    - deploy_to_production

  # Scoring personalizado
  scoring:
    critical_penalty: 25
    warning_penalty: 10
    blocked_threshold: 40
    review_threshold: 70

  # Audit requirements
  audit:
    required: true
    min_retention_days: 30

  # Entornos donde aplican reglas extra
  environments:
    production:
      require_human_approval: true
      forbidden_actions_extra:
        - delete_files
        - modify_permissions
    staging:
      require_human_approval: false
