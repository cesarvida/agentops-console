# Parts Ordering Agent - Intelligent Predictive Maintenance
# Optimizes parts procurement based on availability, cost, and delivery times

name: "Parts Ordering Agent"
version: "1.0.0"
owner: "supply-chain-team@factory.com"
environment: "production"

description: |
  Analyzes repair plan requirements, checks inventory levels, and generates 
  optimized parts orders from suppliers. Considers costs, availability, delivery 
  times, and consolidates orders to minimize lead times and costs.
  
  Source: challenge-3/agents/parts_ordering_agent.py
  Language: Python
  Model: gpt-4.1 (Foundry Prompt Agent)
  Framework: Microsoft Agent Framework with A2A (Agent-to-Agent) protocol
  Database: Cosmos DB

configuration:
  owner: "supply-chain-team@factory.com"
  email: "parts-ordering@factory.com"
  team: "Supply Chain"
  slack_channel: "#parts-procurement"
  database_connection: "cosmosdb://factory-operations"
  a2a_protocol: "HTTP (.well-known/agent-card.json)"

tools:
  - name: "get_work_order_details"
    description: "Retrieve work order with parts requirements"
    scope: "read"
    
  - name: "check_inventory_levels"
    description: "Query current inventory against reorder points"
    scope: "read"
    
  - name: "query_supplier_catalog"
    description: "Search supplier catalogs and pricing"
    scope: "read"
    
  - name: "calculate_costs"
    description: "Compute ordering costs including delivery"
    scope: "read"
    
  - name: "optimize_order"
    description: "Consolidate and optimize order quantities"
    scope: "read"
    
  - name: "create_parts_order"
    description: "Generate parts order and save to database"
    scope: "write"
    
  - name: "update_inventory_forecast"
    description: "Update inventory forecasting with order"
    scope: "write"
    
  - name: "notify_suppliers"
    description: "Send order notifications to suppliers"
    scope: "write"

connections:
  - name: "work-order-db"
    type: "Cosmos DB"
    description: "Work order details"
    
  - name: "inventory-db"
    type: "Cosmos DB"
    description: "Current inventory levels"
    
  - name: "supplier-catalog-db"
    type: "Cosmos DB"
    description: "Supplier catalogs and pricing"
    
  - name: "supplier-api"
    type: "REST API"
    description: "External supplier systems"

input_schema:
  - work_order_id: "string"
    required_parts:
      - part_number: "string"
        quantity: "integer"
        description: "string"
    priority: "URGENT|HIGH|MEDIUM|LOW"
    budget_limit: "float (optional)"

output_schema:
  OrderId: "string"
  WorkOrder: "string"
  Status: "Pending|Ordered|Backordered|Received"
  OrderItems:
    - PartNumber: "string"
      Description: "string"
      Quantity: "integer"
      UnitPrice: "float"
      LineTotal: "float"
      Supplier: "string"
      EstimatedDelivery: "ISO 8601"
      Urgency: "STOCK|SPECIAL_ORDER|BACKORDER"
  TotalCost: "float"
  EstimatedDeliveryDate: "ISO 8601"
  OrderDate: "ISO 8601"
  PaymentTerms: "string"
  ShippingMethod: "string"
  Reasoning: "string"
  CostOptimizations: "array"
  InventoryImpact: "object"

rules:
  - type: "audit_logging"
    enabled: true
    log_all_orders: true
    log_cost_decisions: true
    log_supplier_selections: true
    
  - type: "rate_limiting"
    requests_per_minute: 120
    orders_per_day: 300
    
  - type: "timeout"
    max_seconds: 300
    inventory_check_timeout: 30
    supplier_query_timeout: 60
    cost_calculation_timeout: 30
    order_creation_timeout: 15
    
  - type: "data_retention"
    retention_days: 730  # 2 years for audit trail
    
  - type: "access_control"
    allowed_data_sources:
      - work_orders
      - inventory_levels
      - supplier_catalogs
      - pricing_data
      - historical_orders
    forbidden_data_sources:
      - employee_data
      - customer_data
      - internal_financial_data
      - credentials
      
  - type: "cost_optimization"
    enable_bulk_consolidation: true
    prefer_in_stock_items: true
    compare_suppliers: true
    warn_on_high_cost: true
    cost_threshold: 10000  # Warn if order > $10,000
    require_approval_if: 25000  # Require approval if > $25,000
    
  - type: "procurement_policy"
    preferred_suppliers: ["Supplier A", "Supplier B", "Supplier C"]
    max_lead_time_days: 30
    consider_express_shipping: true
    consolidate_orders: true
    minimum_order_consolidation_window_hours: 24
    
  - type: "inventory_management"
    respect_reorder_points: true
    consider_safety_stock: true
    forecast_future_demand: true
    optimize_for_cash_flow: true

deployment:
  platform: "Azure"
  language: "Python"
  framework: "Microsoft Agent Framework"
  communication: "A2A Protocol (HTTP)"
  database: "Cosmos DB"
  instance_count: 2
  memory_mb: 768
  cpu_cores: 2

quality_gates:
  verify_part_compatibility: true
  check_supplier_availability: true
  validate_cost_estimates: true
  require_approval_if_delivery_late: true
  escalate_if_critical_shortage: true

performance_metrics:
  target_order_creation_time_seconds: 120
  target_cost_savings_percentage: 10
  target_delivery_accuracy: 0.98
  target_supplier_satisfaction: 0.95
