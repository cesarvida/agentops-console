# Fault Diagnosis Agent - Intelligent Predictive Maintenance
# Proposes root causes for detected faults using telemetry and knowledge base

name: "Fault Diagnosis Agent"
version: "1.0.0"
owner: "predictive-maintenance-team@factory.com"
environment: "production"

description: |
  Analyzes detected anomalies and sensor deviations to determine most likely 
  root causes using documented historical knowledge (runbooks, prior work orders, 
  technician notes). Never uses general knowledge - only grounded references.
  
  Source: challenge-1/agents/fault_diagnosis_agent.py
  Model: gpt-4.1
  Framework: Azure AI Foundry Agent

configuration:
  owner: "predictive-maintenance-team@factory.com"
  email: "fault-diagnostics@factory.com"
  team: "Engineering Support"
  slack_channel: "#fault-diagnosis"
  knowledge_base_url: "https://factory-wiki.internal/machinery"

tools:
  - name: "query_machine_data"
    description: "Fetches machine details for root cause analysis"
    scope: "read"
    
  - name: "search_knowledge_base"
    description: "Retrieves machine wiki and fault type documentation"
    scope: "read"
    
  - name: "query_historical_faults"
    description: "Searches previous work orders and technician notes"
    scope: "read"
    
  - name: "create_fault_report"
    description: "Generates structured fault diagnosis report"
    scope: "write"

connections:
  - name: "machine-data"
    type: "MCP Tool"
    description: "Machine details and specifications"
    
  - name: "knowledge-base"
    type: "MCP Tool"
    description: "Machine wiki, runbooks, and fault documentation"
    
  - name: "work-order-history"
    type: "database"
    description: "Historical maintenance records"

input_schema:
  - anomaly_id: "string"
    fault_type: "string"
    affected_metrics:
      - metric_name: "string"
        value: "float"
        threshold: "float"
    machine_id: "string"

output_schema:
  MachineId: "string"
  FaultType: "string (must be from knowledge base)"
  RootCause: "string"
  Severity: "Low|Medium|High|Critical|Unknown"
  DetectedAt: "ISO 8601"
  Metadata:
    MostLikelyRootCauses: "array from knowledge base"
    ObservedMetrics: "object"
    ThresholdViolations: "array"
    ConfidenceLevel: "0-100 percentage"
    KnowledgeSourcesUsed: "array of references"

rules:
  - type: "knowledge_grounding"
    enabled: true
    allow_general_knowledge: false
    require_references: true
    unknown_threshold: 0.3  # Set to "Unknown" if <30% confidence
    
  - type: "audit_logging"
    enabled: true
    log_all_queries: true
    log_knowledge_sources: true
    
  - type: "rate_limiting"
    requests_per_minute: 150
    diagnoses_per_hour: 500
    
  - type: "timeout"
    max_seconds: 120
    knowledge_search_timeout: 45
    
  - type: "data_retention"
    retention_days: 180
    
  - type: "access_control"
    allowed_data_sources:
      - machine_specifications
      - fault_documentation
      - work_order_history
      - sensor_data
    forbidden_data_sources:
      - employee_names
      - contractor_data
      - financial_data
      - credentials

deployment:
  platform: "Azure AI Foundry"
  model: "gpt-4.1"
  region: "swedencentral"
  instance_count: 1
  memory_mb: 768
  cpu_cores: 2

versioning:
  knowledge_base_version: "2.1.0"
  requires_knowledge_sync: true
  knowledge_sync_interval_hours: 24

quality_gates:
  min_confidence_for_decision: 0.6
  require_human_review_if: "Unknown"
  escalation_threshold: "Critical"
