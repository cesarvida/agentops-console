name: ProductionAgent
version: "1.0.0"
description: Production-grade AI agent for real-world deployments
purpose: |
  This agent demonstrates governance compliance in production environments,
  with proper audit logging, rate limiting, and action controls.
  
owner: cesarvida

tools:
  - name: code_reader
    description: Read and analyze code repositories
    required_permissions:
      - read_code
      - analyze_syntax
      
  - name: comment_poster
    description: Post analysis results as comments
    required_permissions:
      - post_comment
      - github_api_access

  - name: report_generator
    description: Generate structured analysis reports
    required_permissions:
      - create_report
      - write_files

  - name: file_explorer
    description: Explore repository file structures
    required_permissions:
      - read_files
      - list_directories

actions:
  - read_code
  - post_comment
  - create_report
  - read_files
  - analyze_syntax
  - github_api_access
  - write_files
  - list_directories

audit:
  log_all_actions: true
  retention_days: 90
  include_payloads: true
  sensitive_data_detection: true

rate_limit:
  requests_per_minute: 60
  burst_allowance: 10
  throttle_on_abuse: true

timeout_seconds: 30

environments:
  - development
  - staging
  - production

security:
  requires_owner_approval: false
  audit_enforcement: true
  
rules:
  - id: "CODE_REVIEW_001"
    name: "Proper code analysis before commenting"
    severity: critical
    
  - id: "AUDIT_LOG_001"
    name: "All actions must be logged"
    severity: critical
    
  - id: "RATE_LIMIT_001"
    name: "Respect rate limits"
    severity: warning
    
  - id: "TIMEOUT_001"
    name: "Operations must complete within timeout"
    severity: warning
