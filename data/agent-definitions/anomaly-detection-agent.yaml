# Anomaly Detection Agent - Intelligent Predictive Maintenance
# Evaluates machine telemetry against thresholds and classifies anomalies

name: "Anomaly Classification Agent"
version: "1.0.0"
owner: "predictive-maintenance-team@factory.com"
environment: "production"

description: |
  Monitors machine telemetry in real-time and classifies anomalies as normal, 
  warning, or critical. Enriches alerts with machine context and raises 
  maintenance alerts with appropriate priority levels.
  
  Source: challenge-1/agents/anomaly_classification_agent.py
  Model: gpt-4.1 or gpt-5.4-nano
  Framework: Azure AI Foundry Agent

configuration:
  owner: "predictive-maintenance-team@factory.com"
  email: "predictive-maintenance@factory.com"
  team: "Predictive Maintenance"
  slack_channel: "#maintenance-alerts"
  
tools:
  - name: "get_machine_data"
    description: "Fetches machine information including ID, model, and maintenance history"
    scope: "read"
    
  - name: "get_thresholds"
    description: "Retrieves metric threshold values per machine type"
    scope: "read"
    
  - name: "raise_alert"
    description: "Creates and sends maintenance alerts to the team"
    scope: "write"
    
  - name: "log_anomaly"
    description: "Logs detected anomalies for historical analysis"
    scope: "write"

connections:
  - name: "machine-data-connection"
    type: "knowledge-base"
    description: "Access machine wiki information and specifications"
    
  - name: "maintenance-data-connection"
    type: "database"
    description: "Retrieve maintenance history and metrics"

input_schema:
  - metric_name: "string"
    metric_value: "float"
    machine_id: "string"
    timestamp: "ISO 8601"
    unit: "string"

output_schema:
  status: "high|medium|normal"
  alerts:
    - name: "string"
      severity: "critical|warning|normal"
      description: "string"
  summary:
    totalRecordsProcessed: "integer"
    violations:
      critical: "integer"
      warning: "integer"

rules:
  - type: "audit_logging"
    enabled: true
    log_threshold_violations: true
    log_all_reads: true
    
  - type: "rate_limiting"
    requests_per_minute: 200
    alerts_per_minute: 100
    
  - type: "timeout"
    max_seconds: 60
    metric_read_timeout: 30
    
  - type: "data_retention"
    retention_days: 90
    archive_older_than: 365
    
  - type: "access_control"
    allowed_data_sources:
      - machine_telemetry
      - thresholds
      - maintenance_history
    forbidden_data_sources:
      - employee_data
      - payroll
      - customer_data
      - credentials

deployment:
  platform: "Azure AI Foundry"
  model: "gpt-4.1"
  region: "swedencentral"
  instance_count: 1
  memory_mb: 512
  cpu_cores: 1

health_checks:
  - interval_seconds: 300
    check_connectivity: true
    check_threshold_data: true
    check_alert_queue: true

rollback_policy:
  auto_rollback_on_error_rate: 0.1  # 10% error rate
  min_success_rate: 0.9
