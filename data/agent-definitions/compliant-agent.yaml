id: code-review-agent
name: Code Review Agent
version: 1.2.3
description: Agent that reviews code for security and quality issues
owner: team-backend

actions:
  - read_code
  - read_files
  - post_comment
  - create_report
  - request_changes

rate_limit:
  requests_per_minute: 60

timeout_seconds: 30

environments:
  - development
  - staging

audit:
  log_all_actions: true
  retention_days: 90

governance:
  allowed_actions:
    - read_code
    - read_files
    - post_comment
    - create_report
    - request_changes
  audit:
    log_all_actions: true
    retention_days: 90

rules:
  - enforce_code_style
  - check_security_issues
  - verify_test_coverage

tools:
  - github_api
  - code_analysis
  - linter

# Excepción válida: acceso temporal a producción con aprobación
exceptions:
  - rule: "Environment Scope Defined"
    reason: "Piloting production deployment for migration — temporary exception"
    approved_by: "cesarvida"
    expires_at: "2026-06-01T00:00:00Z"
