# STAGING ENVIRONMENT RULES
# Production-like environment with moderate controls

environment: "staging"
version: "1.0.0"

description: |
  Staging environment governance rules.
  Production-like with test data and moderate controls.
  All changes require owner approval.

# ═══════════════════════════════════════════════════════════════

allowedActions:
  - read_telemetry
  - classify_anomaly
  - raise_alert
  - log_anomaly
  - query_thresholds
  - get_machine_data
  - create_work_order
  - query_inventory

forbiddenActions:
  - delete_production_data
  - modify_permanent_data
  - access_pii
  - store_credentials
  - bypass_audit_logging
  - execute_arbitrary_code

# ═══════════════════════════════════════════════════════════════

governance:
  requireOwner: true
  requireAudit: true
  requireApproval: false
  requireVersion: true

audit:
  enabled: true
  logLevel: "INFO"
  retention_days: 30

# ═══════════════════════════════════════════════════════════════

rateLimiting:
  anomaly_detection: 200/minute
  alerts: 80/minute
  work_orders: 20/hour
  database_queries: 100/minute

timeout:
  anomaly_detection: 120s
  database_query: 30s
  api_call: 60s

resourceLimits:
  max_concurrent: 50
  max_database_connections: 20
  max_api_connections: 30

# ═══════════════════════════════════════════════════════════════

dataProtection:
  - rule: "ENCRYPTION_IN_TRANSIT"
    severity: "HIGH"
    action: "BLOCK_UNENCRYPTED"
  
  - rule: "NO_PRODUCTION_SECRETS"
    severity: "CRITICAL"
    action: "BLOCK"
  
  - rule: "NO_PII"
    severity: "CRITICAL"
    action: "BLOCK"
