# DEVELOPMENT ENVIRONMENT RULES
# Permissive rules for testing and experimentation

environment: "development"
version: "1.0.0"

description: |
  Development environment governance rules.
  Permissive to allow experimentation, testing, and rapid iteration.

# ═══════════════════════════════════════════════════════════════

allowedActions:
  - read_telemetry
  - classify_anomaly
  - raise_alert
  - log_anomaly
  - query_thresholds
  - get_machine_data
  - test_data
  - reset_database
  - debug_mode

forbiddenActions:
  - delete_production_data
  - access_pii
  - store_credentials
  - bypass_audit

# ═══════════════════════════════════════════════════════════════

governance:
  requireOwner: false
  requireAudit: false
  requireApproval: false
  requireVersion: false

# ═══════════════════════════════════════════════════════════════

rateLimiting:
  anomaly_detection: 1000/minute
  alerts: 500/minute
  database_queries: unlimited

timeout:
  default: 300s
  database_query: 60s

dataProtection:
  - rule: "NO_SECRETS"
    severity: "HIGH"
    action: "BLOCK"
