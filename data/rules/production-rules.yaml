# PRODUCTION ENVIRONMENT RULES
# Strict governance for live manufacturing environment

environment: "production"
version: "1.0.0"

description: |
  Production environment governance rules.
  Strict rules for live manufacturing operations.
  All write actions require approval. Zero tolerance for mistakes.

# ═══════════════════════════════════════════════════════════════

allowedActions:
  - read_telemetry
  - classify_anomaly
  - raise_alert
  - log_anomaly
  - query_thresholds
  - get_machine_data

forbiddenActions:
  - delete_any_data
  - modify_any_data
  - access_pii
  - store_credentials
  - bypass_audit_logging
  - execute_arbitrary_code
  - modify_thresholds_without_approval
  - cancel_orders_without_approval
  - access_employee_data

# ═══════════════════════════════════════════════════════════════

governance:
  requireOwner: true
  requireAudit: true
  requireApproval: true
  requireVersion: true
  requireCodeSigning: true
  requireSecurityScan: true

approvalWorkflow:
  critical_alerts:
    required: true
    approvers: ["ops-manager@factory.com"]
    sla_hours: 1

audit:
  enabled: true
  logLevel: "INFO"
  logAllActions: true
  retention_days: 2555  # 7 years
  immutable_storage: true
  encryption: "AES-256"

# ═══════════════════════════════════════════════════════════════

rateLimiting:
  anomaly_detection: 60/minute
  alerts: 20/minute
  critical_alerts: 5/minute

timeout:
  anomaly_detection: 60s
  database_query: 30s
  api_call: 30s

resourceLimits:
  max_concurrent: 10
  max_database_connections: 5
  max_api_connections: 5
  cpu_limit: 1
  memory_limit: 256MB

# ═══════════════════════════════════════════════════════════════

cost:
  daily_budget: 10000
  warn_at: 7000
  alert_at: 9000
  hard_cap: 10500

# ═══════════════════════════════════════════════════════════════

dataProtection:
  - rule: "NO_PII"
    severity: "CRITICAL"
    action: "IMMEDIATELY_BLOCK"
  
  - rule: "NO_PRODUCTION_SECRETS"
    severity: "CRITICAL"
    action: "IMMEDIATELY_BLOCK"
  
  - rule: "ENCRYPTION_IN_TRANSIT"
    severity: "HIGH"
    action: "BLOCK_UNENCRYPTED"
  
  - rule: "ENCRYPTION_AT_REST"
    severity: "HIGH"
    action: "BLOCK_UNENCRYPTED"

# ═══════════════════════════════════════════════════════════════

compliance:
  gdpr_compliant: true
  hipaa_eligible: true
  iso27001_compliant: true
  soc2_compliant: true
  annual_audit: true
  security_scan_frequency: "daily"

disasterRecovery:
  backup_frequency: "hourly"
  backup_retention: "30 days"
  rpo_minutes: 5
  rto_minutes: 10

escalation:
  enabled: true
  slack_channel: "#production-alerts"
  alert_on_errors: true
  alert_on_timeouts: true
  alert_on_budget_exceeded: true
  critical_alert: "immediate"
