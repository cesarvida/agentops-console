rules:
  name: "Development Rules"
  description: "Reglas relajadas para desarrollo"
  
  actions:
    allowed:
      - read_code
      - post_comment
      - read_files
      - read_logs
      - create_report
      - send_notification
      - access_database
      - deploy_to_staging
    forbidden:
      - push_to_main
      - delete_database
      - bypass_authentication

  requirements:
    owner_required: false
    audit_required: false
    version_required: true

  scoring:
    critical_penalty: 20
    warning_penalty: 5
    blocked_threshold: 20
    review_threshold: 50
